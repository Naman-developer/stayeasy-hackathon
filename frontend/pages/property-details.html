<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayEasy | Property Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/tokens.css" />
    <link rel="stylesheet" href="../css/marketplace.css" />
  </head>
  <body class="marketplace-body">
    <header class="market-nav">
      <a class="market-brand" href="../index.html">StayEasy</a>
      <div class="market-actions">
        <a class="market-btn ghost" href="./search-results.html">Back to Search</a>
        <a class="market-btn primary" href="./login.html">Login</a>
      </div>
    </header>

    <main class="market-main">
      <section class="content-card">
        <h1 class="page-title">Property Details</h1>
        <div class="flow-steps" aria-label="Booking flow">
          <span class="flow-step is-active">1. Select Details</span>
          <span class="flow-step">2. Confirm Booking</span>
          <span class="flow-step">3. Payment</span>
        </div>
        <p class="muted-text">Review amenities, pricing, and owner info before moving to booking.</p>
      </section>

      <section id="propertyDetailsCard" class="content-card">
        <p class="muted-text">Loading property details...</p>
      </section>
    </main>

    <script src="../js/ui.js"></script>
    <script src="../js/property.js"></script>
  </body>
</html>
